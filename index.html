<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1B2A5E">
<meta name="description" content="Controle de Patrimônio Brandão & Marmo Engenharia">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Patrimônio">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Brandão & Marmo — Controle de Patrimônio</title>
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --brand-orange: #EE7E22;
    --brand-orange-dark: #C8631A;
    --brand-orange-light: #fde6d2;
    --brand-navy: #1B2A5E;
    --brand-navy-dark: #0F1A40;
    --brand-navy-light: #e3e7f3;
    --success: #16a34a;
    --warning: #ea580c;
    --danger: #dc2626;
    --bg: #f4f4f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e7eb;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overscroll-behavior-y: contain;
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 84px; background: var(--bg); position: relative; }

  /* ===== TOP BAR ===== */
  header.topbar {
    background: var(--brand-navy);
    color: white;
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
    border-bottom: 3px solid var(--brand-orange);
  }
  header.topbar .brand { display: flex; flex-direction: column; line-height: 1.1; }
  header.topbar .brand .name { font-size: 15px; font-weight: 800; letter-spacing: 1px; }
  header.topbar .brand .name .amp { color: var(--brand-orange); }
  header.topbar .brand .tag { font-size: 10px; color: var(--brand-orange); font-weight: 600; letter-spacing: 0.5px; margin-top: 2px; }
  header.topbar .right { display: flex; gap: 6px; align-items: center; }
  header.topbar .icon-btn {
    background: rgba(255,255,255,.1); border: 0; color: white; width: 36px; height: 36px;
    border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  header.topbar .icon-btn:active { background: rgba(255,255,255,.22); }
  header.topbar .icon-btn .badge-dot {
    position: absolute; top: 4px; right: 4px;
    background: var(--brand-orange); color: var(--brand-navy);
    min-width: 16px; height: 16px; border-radius: 8px;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
  }

  /* botão de refresh com animação */
  @keyframes bm-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  header.topbar .icon-btn.spinning svg,
  header.topbar .icon-btn.spinning .ic { animation: bm-spin 0.6s linear; }

  main.content { padding: 16px; }
  .page-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: var(--brand-navy); }
  .page-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .card h2 { font-size: 15px; margin-bottom: 10px; color: var(--brand-navy); font-weight: 700; }
  .card .card-hint { font-size: 12px; color: var(--muted); margin-top: -4px; margin-bottom: 10px; }

  /* ===== STATS ===== */
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
  .stat {
    background: var(--card); border-radius: 12px; padding: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    border-left: 4px solid var(--brand-orange);
  }
  .stat .label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-size: 22px; font-weight: 800; color: var(--brand-navy); margin-top: 4px; }
  .stat.alert { border-left-color: var(--brand-orange); }
  .stat.alert .value { color: var(--warning); }

  /* ===== BUTTONS ===== */
  .btn {
    background: var(--brand-orange); color: white; border: 0; padding: 12px 16px;
    border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .15s;
  }
  .btn:active { background: var(--brand-orange-dark); }
  .btn.secondary { background: white; color: var(--brand-navy); border: 1px solid var(--border); }
  .btn.secondary:active { background: #f3f4f6; }
  .btn.outline-red { background: white; color: var(--brand-orange); border: 1px solid var(--brand-orange); }
  .btn.dark { background: var(--brand-navy); color: white; }
  .btn.danger { background: var(--danger); }
  .btn.warning { background: var(--warning); }
  .btn.success { background: var(--success); }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== FORMS ===== */
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; font-size: 15px;
    border: 1px solid var(--border); border-radius: 8px; background: white;
    font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: 2px solid var(--brand-orange); outline-offset: -1px; border-color: var(--brand-orange);
  }
  .form-group input:read-only, .form-group input:disabled,
  .form-group textarea:read-only, .form-group textarea:disabled,
  .form-group select:disabled {
    background: #f3f4f6; color: #6b7280; cursor: not-allowed;
  }
  .form-help { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .lock-hint { background: #fef9c3; border: 1px solid #fde68a; color: #854d0e; padding: 8px 10px; border-radius: 8px; font-size: 12px; display: flex; gap: 6px; align-items: flex-start; margin-bottom: 12px; }

  /* ===== ITEM LIST ===== */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item {
    background: var(--card); border-radius: 10px; padding: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,.05);
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    border-left: 3px solid transparent;
  }
  .item:active { background: #f8fafc; }
  .item.cat-ti { border-left-color: var(--brand-navy); }
  .item.cat-obra { border-left-color: var(--brand-orange); }
  .item.pending-accept { border-left-color: var(--warning); background: #fff7ed; }
  .item .item-icon {
    width: 42px; height: 42px; border-radius: 10px; background: var(--brand-orange-light);
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    flex-shrink: 0;
  }
  .item.cat-ti .item-icon { background: var(--brand-navy-light); }
  .item.cat-obra .item-icon { background: var(--brand-orange-light); }
  .item .item-info { flex: 1; min-width: 0; }
  .item .item-info .title { font-weight: 700; font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item .item-info .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item .item-info .codigo { font-family: 'SF Mono', Consolas, monospace; font-size: 11px; color: var(--brand-orange); font-weight: 600; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .badge.ativo { background: #dcfce7; color: #166534; }
  .badge.aguardando_aceite { background: #fed7aa; color: #9a3412; }
  .badge.manutencao { background: #fef3c7; color: #854d0e; }
  .badge.emprestado { background: #ddd6fe; color: #5b21b6; }
  .badge.baixado { background: #fee2e2; color: #991b1b; }
  .badge.extraviado { background: #fecaca; color: #7f1d1d; }
  .badge.aguardando_aprovacao_cadastro { background: #e0e7ff; color: #3730a3; }
  .badge.aguardando_aprovacao_baixa    { background: #fde68a; color: #92400e; }
  .badge.aguardando_aprovacao_extravio { background: #fde68a; color: #92400e; }
  .badge.cat-ti { background: var(--brand-navy-light); color: var(--brand-navy); }
  .badge.cat-obra { background: var(--brand-orange-light); color: var(--brand-orange-dark); }

  /* ===== BOTTOM NAV ===== */
  nav.bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; background: white;
    border-top: 1px solid var(--border);
    display: grid;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
    box-shadow: 0 -2px 8px rgba(0,0,0,.04);
  }
  nav.bottom-nav button {
    background: none; border: 0; padding: 10px 4px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--muted); font-size: 10px; font-weight: 600;
    position: relative;
  }
  nav.bottom-nav button.active { color: var(--brand-orange); }
  nav.bottom-nav button .nav-icon { font-size: 20px; }
  nav.bottom-nav button .nav-pill {
    position: absolute; top: 4px; right: calc(50% - 22px);
    background: var(--brand-orange); color: var(--brand-navy);
    font-size: 9px; font-weight: 800;
    border-radius: 8px; padding: 1px 5px;
    min-width: 16px; text-align: center;
  }

  /* ===== SCANNER ===== */
  .scanner-container {
    background: black; border-radius: 12px; overflow: hidden;
    aspect-ratio: 4/3; position: relative;
  }
  #scanner-video { width: 100%; height: 100%; object-fit: cover; }
  .scanner-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; display: flex; align-items: center; justify-content: center;
  }
  .scanner-overlay::before {
    content: ''; width: 70%; height: 30%; border: 3px solid var(--brand-orange); border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,.4);
  }
  .scanner-status {
    position: absolute; bottom: 10px; left: 10px; right: 10px;
    background: rgba(0,0,0,.75); color: white; padding: 8px 12px;
    border-radius: 8px; font-size: 13px; text-align: center;
  }

  /* ===== MODAL ===== */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .modal {
    background: white; width: 100%; max-width: 480px; max-height: 92vh;
    border-radius: 16px 16px 0 0; padding: 20px; overflow-y: auto;
  }
  .modal h2 { margin-bottom: 14px; color: var(--brand-navy); }
  .modal .close-btn {
    position: absolute; top: 12px; right: 16px; background: none; border: 0;
    font-size: 24px; color: var(--muted); cursor: pointer;
  }

  .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; }
  .empty-state .emoji { font-size: 48px; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .filter-row select, .filter-row input { flex: 1; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; background: white; }

  .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; }
  .detail-row:last-child { border-bottom: 0; }
  .detail-row .label { color: var(--muted); font-size: 13px; flex-shrink: 0; }
  .detail-row .value { font-weight: 600; font-size: 14px; text-align: right; word-break: break-word; }

  .timeline { border-left: 2px solid var(--border); padding-left: 16px; margin-left: 8px; margin-top: 8px; }
  .timeline-item { padding-bottom: 14px; position: relative; }
  .timeline-item::before {
    content: ''; position: absolute; left: -22px; top: 4px;
    width: 10px; height: 10px; border-radius: 50%; background: var(--brand-orange);
  }
  .timeline-item.acceptance::before { background: var(--success); }
  .timeline-item .when { font-size: 11px; color: var(--muted); }
  .timeline-item .what { font-size: 14px; font-weight: 600; margin: 2px 0; color: var(--brand-navy); }
  .timeline-item .who { font-size: 12px; color: var(--muted); }
  .timeline-item .meta { font-size: 12px; color: var(--text); margin-top: 2px; }

  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--brand-navy); color: white; padding: 10px 16px;
    border-radius: 8px; z-index: 300; font-size: 14px; font-weight: 500;
    animation: toastIn .25s ease;
    max-width: 90%; text-align: center;
  }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* ===== QUICK ACTIONS ===== */
  .quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .quick-action {
    background: white; border: 0; border-radius: 12px; padding: 16px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05); cursor: pointer; font-size: 12px; font-weight: 600;
    color: var(--brand-navy); text-align: center;
  }
  .quick-action .qa-icon { font-size: 26px; }
  .quick-action:active { background: #f8fafc; }
  .quick-action.primary { background: var(--brand-orange); color: white; }
  .quick-action.primary:active { background: var(--brand-orange-dark); }
  .quick-action.dark { background: var(--brand-navy); color: white; }

  .seg-control { display: flex; background: var(--border); border-radius: 8px; padding: 3px; margin-bottom: 12px; }
  .seg-control button {
    flex: 1; background: none; border: 0; padding: 8px; font-size: 12px; font-weight: 600;
    border-radius: 6px; cursor: pointer; color: var(--muted);
  }
  .seg-control button.active { background: white; color: var(--brand-orange); box-shadow: 0 1px 2px rgba(0,0,0,.05); }

  /* ===== LOGIN ===== */
  .login-screen {
    min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 24px;
    background:
      radial-gradient(circle at 18% 12%, rgba(238,126,34,0.20), transparent 42%),
      radial-gradient(circle at 88% 92%, rgba(238,126,34,0.10), transparent 45%),
      linear-gradient(160deg, #0F1A40 0%, #1B2A5E 55%, #14224d 100%);
    position: relative;
    overflow: hidden;
  }
  /* trama sutil que remete a etiquetas/codigo de barras */
  .login-screen::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background-image: repeating-linear-gradient(
      90deg,
      rgba(255,255,255,0.05) 0 2px,
      transparent 2px 7px,
      rgba(255,255,255,0.025) 7px 9px,
      transparent 9px 16px
    );
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, black 30%, black 70%, transparent 100%);
            mask-image: linear-gradient(180deg, transparent 0%, black 30%, black 70%, transparent 100%);
    opacity: 0.55;
  }
  .login-screen > * { position: relative; z-index: 1; }

  .login-screen .brand-icon {
    width: 76px; height: 76px; margin: 0 auto 14px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(145deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .login-screen .brand-icon svg { width: 42px; height: 42px; display: block; }

  .login-screen .logo { text-align: center; color: white; margin-bottom: 18px; }
  .login-screen .logo .brand-mark {
    font-size: 24px; font-weight: 800; letter-spacing: 2px;
    display: inline-block; margin-bottom: 6px;
  }
  .login-screen .logo .brand-mark .amp { color: var(--brand-orange); }
  .login-screen .logo .tagline {
    font-size: 11px; opacity: 0.7; letter-spacing: 2px; font-weight: 600;
  }
  .login-screen .pill-wrap { text-align: center; margin-bottom: 24px; }
  .login-screen .system-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.92);
    border: 1px solid rgba(238,126,34,0.45);
    font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
    padding: 6px 14px; border-radius: 20px;
  }
  .login-screen .system-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--brand-orange);
    box-shadow: 0 0 8px rgba(238,126,34,0.85);
  }

  .login-card {
    background: white; border-radius: 16px; padding: 26px 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.15);
    border-top: 3px solid var(--brand-orange);
  }
  .login-card h2 { margin-bottom: 4px; color: var(--brand-navy); font-size: 20px; }
  .login-card .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

  .login-screen .footer-mark {
    text-align: center; margin-top: 20px;
    color: rgba(255,255,255,0.45); font-size: 10px; letter-spacing: 1.5px;
  }

  hr.separator { border: 0; border-top: 1px solid var(--border); margin: 12px 0; }

  .pill { background: var(--brand-orange-light); color: var(--brand-orange-dark); padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; display: inline-block; }
  .pill.dark { background: var(--brand-navy); color: white; }

  .role-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .role-chip.diretoria { background: var(--brand-navy); color: var(--brand-orange); }
  .role-chip.admin_ti { background: var(--brand-navy); color: white; }
  .role-chip.admin_obras { background: var(--brand-orange); color: white; }
  .role-chip.operador { background: var(--border); color: var(--brand-navy); }

  .alert-bar { background: #fff7ed; border: 1px solid #fdba74; color: #9a3412; padding: 12px; border-radius: 10px; margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start; cursor: pointer; }
  .alert-bar .ab-icon { font-size: 22px; }
  .alert-bar .ab-body { flex: 1; }
  .alert-bar .ab-title { font-weight: 700; font-size: 14px; }
  .alert-bar .ab-text { font-size: 12px; margin-top: 2px; }
  .alert-bar .ab-cta { font-size: 11px; font-weight: 700; color: var(--brand-orange); margin-top: 4px; }

  .accept-card { background: #fff7ed; border: 2px solid var(--warning); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .accept-card .ac-title { font-weight: 700; color: #9a3412; font-size: 14px; }
  .accept-card .ac-meta { font-size: 12px; color: #9a3412; margin-top: 4px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================ */
/* BRANDÃO & MARMO ENGENHARIA — Controle de Patrimônio          */
/* Versão de produção (Supabase realtime + cache local)         */
/* ============================================================ */

/* ----- Configuração Supabase -------------------------------- */
const SUPABASE_URL = 'https://ehowzelpklxuyuccxncu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_yPyOUxBxBSg4YBbOxqCc1w_pXDDqlG1';

const SB = (typeof supabase !== 'undefined' && SUPABASE_URL && SUPABASE_KEY)
  ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { realtime: { params: { eventsPerSecond: 5 } } })
  : null;

/* ------------------------------------------------------------ */
const Storage = {
  KEY: 'bm_patrimonio_prod',
  USER_KEY: 'bm_patrimonio_currentUser',  // sessão local (NUNCA sincronizada)
  _saving: false,
  _pending: null,

  // Remove currentUser antes de subir/baixar do Supabase
  _stripSession(d) { if (!d) return d; const { currentUser, ...rest } = d; return rest; },

  // Lê a sessão local (qual usuário está logado neste navegador)
  loadSession() {
    const raw = localStorage.getItem(this.USER_KEY);
    return raw ? parseInt(raw) || null : null;
  },
  saveSession(userId) {
    if (userId == null) localStorage.removeItem(this.USER_KEY);
    else localStorage.setItem(this.USER_KEY, String(userId));
  },

  async load() {
    const localSession = this.loadSession();
    if (SB) {
      try {
        const { data, error } = await SB.from('app_state').select('data').eq('id', 1).maybeSingle();
        if (error) throw error;
        if (data && data.data && Object.keys(data.data).length > 0) {
          const merged = { ...data.data, currentUser: localSession };
          localStorage.setItem(this.KEY, JSON.stringify(this._stripSession(merged)));
          return merged;
        }
        // Sem dados ainda — semeia e envia (sem currentUser)
        const seeded = this.seed();
        await SB.from('app_state').upsert({ id: 1, data: this._stripSession(seeded), updated_at: new Date().toISOString() });
        return { ...seeded, currentUser: localSession };
      } catch (e) {
        console.warn('[Supabase] load falhou, usando cache local:', e.message);
      }
    }
    const raw = localStorage.getItem(this.KEY);
    if (raw) { try { return { ...JSON.parse(raw), currentUser: localSession }; } catch {} }
    return { ...this.seed(), currentUser: localSession };
  },

  save(data) {
    // Persiste sessão local separadamente
    this.saveSession(data && data.currentUser);
    const shared = this._stripSession(data);
    localStorage.setItem(this.KEY, JSON.stringify(shared));
    if (!SB) return;
    // Coalesce múltiplos saves seguidos numa única upsert
    this._pending = shared;
    if (this._saving) return;
    this._saving = true;
    queueMicrotask(async () => {
      while (this._pending) {
        const payload = this._pending; this._pending = null;
        const { error } = await SB.from('app_state')
          .upsert({ id: 1, data: payload, updated_at: new Date().toISOString() });
        if (error) console.error('[Supabase] save erro:', error.message);
      }
      this._saving = false;
    });
  },

  subscribe(onChange) {
    if (!SB) return null;
    return SB.channel('app_state_realtime')
      .on('postgres_changes',
          { event: '*', schema: 'public', table: 'app_state' },
          (payload) => { if (payload.new && payload.new.data) onChange(payload.new.data); })
      .subscribe();
  },

  seed() {
    return {
      currentUser: null,
      usuarios: [
        { id: 1, nome: 'Diretoria',           email: 'diretoria@brandaomarmo.com', senha: 'TrocarSenha@123', perfil: 'diretoria',  setor: 'Diretoria' },

function toast(msg, kind='') {

/* ============== AUTH & PERMISSIONS ============== */

const Perms = {
  isAdmin(u) { return u && (u.perfil === 'diretoria' || u.perfil === 'admin_ti' || u.perfil === 'admin_obras'); },
  isDiretoria(u) { return u && u.perfil === 'diretoria'; },
  isOperador(u) { return u && u.perfil === 'operador'; },
  canManageCategoria(u, categoriaId) {
    if (!u) return false;
    if (u.perfil === 'diretoria') return true;
    if (u.perfil === 'admin_ti'   && (categoriaId === 2 || categoriaId === 3)) return true;
    if (u.perfil === 'admin_obras'&& categoriaId === 1) return true;
    return false;
  },
  canCreate(u) { return !!u; },
  canDelete(u) { return Perms.isDiretoria(u); },
  canApproveCadastro(u, categoriaId) {
    if (!u) return false;
    if (u.perfil === 'diretoria') return true;
    if (u.perfil === 'admin_ti'   && (categoriaId === 2 || categoriaId === 3)) return true;
    if (u.perfil === 'admin_obras'&& categoriaId === 1) return true;
    return false;
  },
  canRequestBaixa(u, categoriaId) { return Perms.canManageCategoria(u, categoriaId); },
  canApproveBaixa(u) { return Perms.isDiretoria(u); },
  allowedCategorias(u) {
    if (!u) return [];
    if (u.perfil === 'diretoria')  return DB.categorias;
    if (u.perfil === 'admin_ti')   return DB.categorias.filter(c => c.id === 2 || c.id === 3);
    if (u.perfil === 'admin_obras')return DB.categorias.filter(c => c.id === 1);
    if (u.perfil === 'operador')   return DB.categorias;
    return [];
  },
  perfilLabel(perfil) {
    return ({
      diretoria:    'Diretoria',
      admin_ti:     'Adm. TI',
      admin_obras:  'Adm. Obras',
      operador:     'Operador'
    })[perfil] || perfil;
  }
};

/* ============== LOOKUPS ============== */

const Lookup = {
  user(id) { return DB.usuarios.find(u => u.id === id); },
  cat(id)  { return DB.categorias.find(c => c.id === id); },
  loc(id)  { return DB.localizacoes.find(l => l.id === id); },
  movs(patrimonioId) { return DB.movimentacoes.filter(m => m.patrimonioId === patrimonioId).sort((a,b) => new Date(a.data) - new Date(b.data)); },
  pendingForUser(userId) {
    return DB.patrimonios.filter(p => p.status === 'aguardando_aceite' && p.responsavelAtualId === userId);
  },
  pendingCadastrosForApprover(user) {
    return DB.patrimonios.filter(p =>
      p.status === 'aguardando_aprovacao_cadastro' &&
      Perms.canApproveCadastro(user, p.categoriaId)
    );
  },
  pendingBaixasForDiretoria(user) {
    if (!Perms.isDiretoria(user)) return [];
    return DB.patrimonios.filter(p =>
      p.status === 'aguardando_aprovacao_baixa' ||
      p.status === 'aguardando_aprovacao_extravio'
    );
  },
  pendingCount(userId) {
    const u = Lookup.user(userId);
    if (!u) return 0;
    return Lookup.pendingForUser(userId).length
         + Lookup.pendingCadastrosForApprover(u).length
         + Lookup.pendingBaixasForDiretoria(u).length;
  },
  canSee(user, p) {
    if (!user || !p) return false;
    if (user.perfil === 'diretoria') return true;
    if (user.perfil === 'admin_ti')    return p.categoriaId === 2 || p.categoriaId === 3;
    if (user.perfil === 'admin_obras') return p.categoriaId === 1;
    return p.responsavelAtualId === user.id || p.criadoPor === user.id;
  },
  visibleItems(user) {
    return DB.patrimonios.filter(p => Lookup.canSee(user, p));
  },
  // Localizações que o usuário pode ver — operador só vê locais onde tem item
  visibleLocations(user) {
    if (!user) return [];
    if (Perms.isAdmin(user)) {
      // admin_ti/obras vê todos os locais (para mover entre obras)
      return DB.localizacoes;
    }
    const myLocs = new Set(Lookup.visibleItems(user).map(p => p.localizacaoAtualId));
    return DB.localizacoes.filter(l => myLocs.has(l.id));
  },
  hasItemsUnderCustody(userId) {
    return DB.patrimonios.some(p => p.responsavelAtualId === userId);
  }
};

  const u = Lookup.user(DB.currentUser);
  const f = State.filter;
  const isAdmin = Perms.isAdmin(u);
  const isOperador = u.perfil === 'operador';
  let items = Lookup.visibleItems(u);

  if (f.q) {
    const q = f.q.toLowerCase();
    items = items.filter(p =>
      p.descricao.toLowerCase().includes(q) ||
      p.codigoBarras.toLowerCase().includes(q) ||
      (p.tipoSoftware || '').toLowerCase().includes(q)
    );
  }
  if (f.status) items = items.filter(p => p.status === f.status);
  if (f.categoria) items = items.filter(p => String(p.categoriaId) === String(f.categoria));
  if (f.local) items = items.filter(p => String(p.localizacaoAtualId) === String(f.local));
  if (f.responsavel) items = items.filter(p => String(p.responsavelAtualId) === String(f.responsavel));

  // Categorias disponíveis para o usuário (admin_ti só vê TI, etc.)
  const catsVisiveis = u.perfil === 'admin_ti' ? DB.categorias.filter(c => c.id === 2 || c.id === 3)
                     : u.perfil === 'admin_obras' ? DB.categorias.filter(c => c.id === 1)
                     : DB.categorias;
  const showCatFilter = catsVisiveis.length > 1;

  // Locais e usuários para os filtros (apenas admins)
  const locaisDisponiveis = Lookup.visibleLocations(u);
  const usuariosDisponiveis = DB.usuarios;

  const titulo = isOperador ? 'Meus bens' : 'Patrimônios';

  return `
    <div class="page-title">${titulo} <span class="pill">${items.length}</span></div>

    <div class="filter-row">
      <input type="text" id="f-q" placeholder="Buscar..." value="${escapeHtml(f.q)}">
    </div>
    <div class="filter-row">
      ${showCatFilter ? `
      <select id="f-cat">
        <option value="">Todas categorias</option>
        ${catsVisiveis.map(c => `<option value="${c.id}" ${String(f.categoria)===String(c.id)?'selected':''}>${c.icone} ${c.nome}</option>`).join('')}
      </select>` : ''}
      <select id="f-status">
        <option value="">Todos status</option>
        <option value="ativo"                            ${f.status==='ativo'?'selected':''}>Ativo</option>
        <option value="aguardando_aceite"                ${f.status==='aguardando_aceite'?'selected':''}>Aguard. aceite</option>
        <option value="aguardando_aprovacao_cadastro"    ${f.status==='aguardando_aprovacao_cadastro'?'selected':''}>Aguard. aprovação cadastro</option>
        <option value="aguardando_aprovacao_baixa"       ${f.status==='aguardando_aprovacao_baixa'?'selected':''}>Aguard. aprovação baixa</option>
        <option value="aguardando_aprovacao_extravio"    ${f.status==='aguardando_aprovacao_extravio'?'selected':''}>Aguard. aprovação extravio</option>
        <option value="manutencao"                       ${f.status==='manutencao'?'selected':''}>Manutenção</option>
        <option value="emprestado"         ${f.status==='emprestado'?'selected':''}>Emprestado</option>
        <option value="baixado"            ${f.status==='baixado'?'selected':''}>Baixado</option>
        <option value="extraviado"         ${f.status==='extraviado'?'selected':''}>Extraviado</option>
      </select>
    </div>
    ${isAdmin ? `
    <div class="filter-row">
      <select id="f-local">
        <option value="">Todas localizações</option>
        ${locaisDisponiveis.map(l => `<option value="${l.id}" ${String(f.local)===String(l.id)?'selected':''}>${escapeHtml(l.nome)}</option>`).join('')}
      </select>
      <select id="f-resp">
        <option value="">Todos responsáveis</option>
        ${usuariosDisponiveis.map(x => `<option value="${x.id}" ${String(f.responsavel)===String(x.id)?'selected':''}>${escapeHtml(x.nome)}</option>`).join('')}
      </select>
    </div>` : ''}

    ${items.length ? `
      <div class="item-list">
        ${items.map(p => renderItemCard(p)).join('')}
      </div>
    ` : `
      <div class="empty-state">
        <div class="emoji">📭</div>
        <p>${isOperador ? 'Você não tem bens sob sua custódia.' : 'Nenhum patrimônio encontrado.'}</p>
      </div>
    `}
  `;
}

function renderItemCard(p) {
  const cat = Lookup.cat(p.categoriaId);
  const loc = Lookup.loc(p.localizacaoAtualId);
  const resp = Lookup.user(p.responsavelAtualId);
  const catClass = cat ? (cat.id === 2 ? 'cat-ti' : 'cat-obra') : '';
  return `
    <div class="item ${catClass} ${p.status === 'aguardando_aceite' ? 'pending-accept' : ''}" data-id="${p.id}" data-action="open">
      <div class="item-icon">${cat ? cat.icone : '📦'}</div>
      <div class="item-info">
        <div class="title">${escapeHtml(p.descricao)}</div>
        <div class="subtitle">${loc ? escapeHtml(loc.nome) : '—'} · ${resp ? escapeHtml(resp.nome) : 'Sem responsável'}</div>
        <div style="margin-top:4px;">
          <span class="codigo">${escapeHtml(p.codigoBarras)}</span>
          <span class="badge ${p.status}" style="margin-left:6px;">${statusLabel(p.status)}</span>
        </div>
      </div>
    </div>
  `;
}

function statusLabel(s) {
  return ({
    ativo:'Ativo',
    aguardando_aceite:'Aguard. aceite',
    aguardando_aprovacao_cadastro:'Aguard. aprovação cadastro',
    aguardando_aprovacao_baixa:'Aguard. aprovação baixa',
    aguardando_aprovacao_extravio:'Aguard. aprovação extravio',
    manutencao:'Manutenção',
    emprestado:'Emprestado',
    baixado:'Baixado',
    extraviado:'Extraviado'
  })[s] || s;
}

function bindList() {
  const q = $('#f-q'); if (q) q.addEventListener('input', e => { State.filter.q = e.target.value; render(); $('#f-q').focus(); });
  const fc = $('#f-cat'); if (fc) fc.addEventListener('change', e => { State.filter.categoria = e.target.value; render(); });
  const fs = $('#f-status'); if (fs) fs.addEventListener('change', e => { State.filter.status = e.target.value; render(); });
  const fl = $('#f-local'); if (fl) fl.addEventListener('change', e => { State.filter.local = e.target.value; render(); });
  const fr = $('#f-resp'); if (fr) fr.addEventListener('change', e => { State.filter.responsavel = e.target.value; render(); });
  $$('[data-action="open"]').forEach(el => el.addEventListener('click', () => openDetail(parseInt(el.dataset.id))));
}

/* ============== DETAIL MODAL ============== */

function openDetail(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  if (!p) return toast('Item não encontrado', 'error');
  const u = Lookup.user(DB.currentUser);
  if (!Lookup.canSee(u, p)) return toast('Sem permissão para visualizar este item', 'error');
  const cat = Lookup.cat(p.categoriaId);
  const loc = Lookup.loc(p.localizacaoAtualId);
  const resp = Lookup.user(p.responsavelAtualId);
  const movs = Lookup.movs(p.id);

  const podeManager = Perms.canManageCategoria(u, p.categoriaId);
  const podeDeletar = Perms.canDelete(u);
  const aguardandoMeuAceite = (p.status === 'aguardando_aceite' && p.responsavelAtualId === u.id);

  const html = `
    <div class="modal-backdrop" id="modal-detail">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="close-btn" data-close>&times;</button>
        <h2>${escapeHtml(p.descricao)}</h2>
        <div style="margin-bottom:12px;">
          <span class="codigo" style="font-family:monospace; color:var(--brand-orange); font-weight:700;">${escapeHtml(p.codigoBarras)}</span>
          <span class="badge ${p.status}" style="margin-left:8px;">${statusLabel(p.status)}</span>
          <span class="badge ${cat && cat.id===2?'cat-ti':'cat-obra'}" style="margin-left:4px;">${cat?cat.icone+' '+cat.nome:'—'}</span>
        </div>

        ${aguardandoMeuAceite ? `
          <div class="accept-card">
            <div class="ac-title">Item aguardando seu aceite</div>
            <div class="ac-meta">Confirme o recebimento para finalizar a movimentação.</div>
            <div style="margin-top:10px;"><button class="btn success" data-action="accept">✓ Confirmar recebimento</button></div>
          </div>
        ` : ''}

        <div class="card" style="padding:12px;">
          <div class="detail-row"><span class="label">Categoria</span><span class="value">${cat ? cat.icone+' '+cat.nome : '—'}</span></div>
          <div class="detail-row"><span class="label">Nota fiscal</span><span class="value">${escapeHtml(p.notaFiscal || '—')}</span></div>
          <div class="detail-row"><span class="label">Aquisição</span><span class="value">${fmtDate(p.dataAquisicao)}</span></div>
          <div class="detail-row"><span class="label">Valor</span><span class="value">${fmtMoney(p.valorAquisicao)}</span></div>
          <div class="detail-row"><span class="label">Localização</span><span class="value">${loc ? escapeHtml(loc.nome) : '—'}</span></div>
          <div class="detail-row"><span class="label">Responsável</span><span class="value">${resp ? escapeHtml(resp.nome) : '—'}</span></div>
          ${p.observacoes ? `<div class="detail-row"><span class="label">Obs.</span><span class="value">${escapeHtml(p.observacoes)}</span></div>` : ''}
          <div class="detail-row"><span class="label">Cadastrado por</span><span class="value">${escapeHtml((Lookup.user(p.criadoPor) || {}).nome || '—')} em ${fmtDate(p.criadoEm)}</span></div>
        </div>

        ${(() => {
          if (p.status === 'aguardando_aprovacao_cadastro' && Perms.canApproveCadastro(u, p.categoriaId)) {
            return `
              <div class="accept-card" style="border-color:#3730a3; background:#eef2ff;">
                <div class="ac-title" style="color:#3730a3;">Cadastro aguardando sua aprovação</div>
                <div class="ac-meta" style="color:#3730a3;">Solicitado por ${escapeHtml((Lookup.user(p.criadoPor)||{}).nome || '—')}.</div>
                <div class="btn-row" style="margin-top:10px;">
                  <button class="btn success" data-action="approve-cad">✓ Aprovar cadastro</button>
                  <button class="btn danger"  data-action="reject-cad">✗ Rejeitar</button>
                </div>
              </div>`;
          }
          if ((p.status === 'aguardando_aprovacao_baixa' || p.status === 'aguardando_aprovacao_extravio') && Perms.canApproveBaixa(u)) {
            const tipo = p.status === 'aguardando_aprovacao_baixa' ? 'baixa' : 'extravio';
            return `
              <div class="accept-card" style="border-color:#92400e;">
                <div class="ac-title">${tipo === 'baixa' ? 'Baixa' : 'Extravio'} aguardando aprovação da Diretoria</div>
                <div class="ac-meta">Solicitado por ${escapeHtml((Lookup.user(p.solicitadoPor)||{}).nome || '—')}${p.solicitacaoMotivo ? ' · ' + escapeHtml(p.solicitacaoMotivo) : ''}.</div>
                <div class="btn-row" style="margin-top:10px;">
                  <button class="btn danger"    data-action="approve-baixa">✓ Aprovar ${tipo}</button>
                  <button class="btn secondary" data-action="reject-baixa">✗ Rejeitar</button>
                </div>
              </div>`;
          }
          if (p.status === 'aguardando_aprovacao_cadastro' && p.criadoPor === u.id) {
            return `<div class="lock-hint" style="margin-top:10px;"><span>⏳</span><span>Aguardando aprovação do administrador da categoria.</span></div>`;
          }
          if (p.status === 'aguardando_aprovacao_baixa' || p.status === 'aguardando_aprovacao_extravio') {
            const tipo = p.status === 'aguardando_aprovacao_baixa' ? 'baixa' : 'extravio';
            return `<div class="lock-hint" style="margin-top:10px;"><span>⏳</span><span>${tipo === 'baixa' ? 'Baixa' : 'Extravio'} aguardando aprovação da Diretoria.</span></div>`;
          }
          if (podeManager) {
            return `
              <div class="btn-row" style="margin-bottom:8px;">
                <button class="btn" data-action="move">↗ Movimentar</button>
                ${p.status !== 'manutencao' ? `<button class="btn warning" data-action="manut">🔧 Manutenção</button>` : `<button class="btn success" data-action="ret-manut">✓ Retornou</button>`}
              </div>
              <div class="btn-row" style="margin-bottom:8px;">
                <button class="btn outline-red" data-action="baixa">⬇ ${Perms.isDiretoria(u) ? 'Baixar' : 'Solicitar baixa'}</button>
                <button class="btn secondary"   data-action="extraviado">⚠ ${Perms.isDiretoria(u) ? 'Extraviado' : 'Solicitar extravio'}</button>
              </div>`;
          }
          return `<div class="lock-hint" style="margin-top:10px;"><span>🔒</span><span>Apenas o administrador da categoria pode movimentar este item.</span></div>`;
        })()}
        ${podeDeletar ? `
          <button class="btn danger" data-action="delete" style="margin-top:8px;">🗑 Excluir patrimônio</button>
        ` : ''}

        <hr class="separator">
        <h2 style="margin-top:8px;">Histórico</h2>
        <div class="timeline">
          ${movs.map(m => renderTimelineEntry(m)).join('')}
        </div>
      </div>
    </div>
  `;

  const wrap = document.createElement('div');
  wrap.innerHTML = html;
  const node = wrap.firstElementChild;
  document.body.appendChild(node);
  node.addEventListener('click', e => { if (e.target === node) node.remove(); });
  node.querySelector('[data-close]').addEventListener('click', () => node.remove());

  const $a = (sel) => node.querySelector(sel);
  if ($a('[data-action="accept"]')) $a('[data-action="accept"]').addEventListener('click', () => { acceptReceipt(p.id); node.remove(); openDetail(p.id); });
  if ($a('[data-action="move"]'))   $a('[data-action="move"]').addEventListener('click', () => { node.remove(); openMove(p.id); });
  if ($a('[data-action="manut"]'))  $a('[data-action="manut"]').addEventListener('click', () => { changeStatus(p.id, 'manutencao', 'Enviado para manutenção'); node.remove(); openDetail(p.id); });
  if ($a('[data-action="ret-manut"]')) $a('[data-action="ret-manut"]').addEventListener('click', () => { changeStatus(p.id, 'ativo', 'Retorno de manutenção', 'retorno_manutencao'); node.remove(); openDetail(p.id); });
  if ($a('[data-action="baixa"]'))  $a('[data-action="baixa"]').addEventListener('click', () => { requestBaixa(p.id, 'baixa'); node.remove(); });
  if ($a('[data-action="extraviado"]')) $a('[data-action="extraviado"]').addEventListener('click', () => { requestBaixa(p.id, 'extravio'); node.remove(); });
  if ($a('[data-action="approve-cad"]')) $a('[data-action="approve-cad"]').addEventListener('click', () => { approveCadastro(p.id); node.remove(); });
  if ($a('[data-action="reject-cad"]'))  $a('[data-action="reject-cad"]').addEventListener('click', () => { if(confirm('Rejeitar este cadastro? O item será removido.')){ rejectCadastro(p.id); node.remove(); }});
  if ($a('[data-action="approve-baixa"]')) $a('[data-action="approve-baixa"]').addEventListener('click', () => { approveBaixa(p.id); node.remove(); });
  if ($a('[data-action="reject-baixa"]'))  $a('[data-action="reject-baixa"]').addEventListener('click', () => { rejectBaixa(p.id); node.remove(); });
  if ($a('[data-action="delete"]')) $a('[data-action="delete"]').addEventListener('click', () => { if(confirm('Excluir definitivamente este patrimônio? Esta ação não pode ser desfeita.')){ deletePatrimonio(p.id); node.remove(); }});
}

function renderTimelineEntry(m) {
  const u = Lookup.user(m.usuarioId);
  const isAccept = m.tipo === 'aceite_recebimento';
  const tipoLabel = ({
    cadastro:'Cadastro inicial',
    solicitacao_cadastro:'Solicitação de cadastro',
    aprovacao_cadastro:'✓ Cadastro aprovado',
    transferencia_local:'Transferência de local',
    transferencia_resp:'Transferência de responsável',
    manutencao:'Enviado para manutenção',
    retorno_manutencao:'Retorno de manutenção',
    aceite_recebimento:'✓ Recebimento confirmado',
    solicitacao_baixa:'Solicitação de baixa',
    solicitacao_extravio:'Solicitação de extravio',
    rejeicao_baixa:'✗ Baixa rejeitada',
    rejeicao_extravio:'✗ Extravio rejeitado',
    baixa:'Baixa do patrimônio',
    extravio:'Item extraviado',
    inventario:'Inventário'
  })[m.tipo] || m.tipo;
  let detalhes = '';
  if (m.destinoLocalId) { const l = Lookup.loc(m.destinoLocalId); if (l) detalhes += '→ ' + l.nome + ' '; }
  if (m.destinoRespId)  { const r = Lookup.user(m.destinoRespId); if (r) detalhes += '· Resp.: ' + r.nome; }
  return `
    <div class="timeline-item ${isAccept?'acceptance':''}">
      <div class="when">${fmtDateTime(m.data)}</div>
      <div class="what">${tipoLabel}</div>
      ${detalhes ? `<div class="meta">${escapeHtml(detalhes)}</div>` : ''}
      ${m.motivo ? `<div class="meta">${escapeHtml(m.motivo)}</div>` : ''}
      <div class="who">por ${escapeHtml(u ? u.nome : '—')}</div>
    </div>
  `;
}

/* ============== MOVE / STATUS ============== */

function openMove(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (!Perms.canManageCategoria(u, p.categoriaId)) return toast('Sem permissão para esta categoria', 'error');

  const html = `
    <div class="modal-backdrop" id="modal-move">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="close-btn" data-close>&times;</button>
        <h2>Movimentar bem</h2>
        <div style="font-size:13px; color:var(--muted); margin-bottom:14px;">${escapeHtml(p.descricao)}</div>

        <div class="lock-hint">
          <span>ℹ️</span>
          <span>O destinatário precisará <strong>aceitar o recebimento</strong> para a movimentação ser efetivada.</span>
        </div>

        <form id="move-form">
          <div class="form-group">
            <label>Tipo</label>
            <select id="m-tipo">
              <option value="transferencia_local_resp">Transferir local e/ou responsável</option>
            </select>
          </div>
          <div class="form-group">
            <label>Novo local</label>
            <select id="m-local">
              <option value="">— Manter (${escapeHtml((Lookup.loc(p.localizacaoAtualId)||{}).nome || '—')}) —</option>
              ${DB.localizacoes.map(l => `<option value="${l.id}">${escapeHtml(l.nome)}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Novo responsável</label>
            <select id="m-resp">
              <option value="">— Manter (${escapeHtml((Lookup.user(p.responsavelAtualId)||{}).nome || '—')}) —</option>
              ${DB.usuarios.map(c => `<option value="${c.id}">${escapeHtml(c.nome)} (${escapeHtml(c.setor || '—')})</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Motivo / Observação</label>
            <textarea id="m-motivo" rows="2" placeholder="Ex.: Realocação para nova obra"></textarea>
          </div>
          <button type="submit" class="btn">Registrar movimentação</button>
        </form>
      </div>
    </div>
  `;
  const wrap = document.createElement('div'); wrap.innerHTML = html;
  const node = wrap.firstElementChild; document.body.appendChild(node);
  node.addEventListener('click', e => { if (e.target === node) node.remove(); });
  node.querySelector('[data-close]').addEventListener('click', () => node.remove());

  node.querySelector('#move-form').addEventListener('submit', e => {
    e.preventDefault();
    const novoLocal = parseInt(node.querySelector('#m-local').value) || null;
    const novoResp = parseInt(node.querySelector('#m-resp').value) || null;
    const motivo = node.querySelector('#m-motivo').value.trim();
    if (!novoLocal && !novoResp) return toast('Escolha local ou responsável', 'error');

    const tipo = novoLocal && novoResp ? 'transferencia_local_resp' : (novoLocal ? 'transferencia_local' : 'transferencia_resp');
    DB.movimentacoes.push({
      id: nextId('movimentacoes'),
      patrimonioId: p.id, tipo,
      data: new Date().toISOString(),
      usuarioId: u.id,
      motivo: motivo || 'Movimentação registrada',
      destinoLocalId: novoLocal, destinoRespId: novoResp
    });
    if (novoLocal) p.localizacaoAtualId = novoLocal;
    if (novoResp)  p.responsavelAtualId = novoResp;
    p.status = 'aguardando_aceite';
    p.atualizadoEm = new Date().toISOString();
    save();
    node.remove();
    toast('Movimentação registrada — aguardando aceite do destinatário', 'success');
    render();
  });
}

function changeStatus(patrimonioId, novoStatus, motivo, tipoMov) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (!Perms.canManageCategoria(u, p.categoriaId)) return toast('Sem permissão para esta categoria', 'error');
  p.status = novoStatus;
  p.atualizadoEm = new Date().toISOString();
  DB.movimentacoes.push({
    id: nextId('movimentacoes'), patrimonioId: p.id,
    tipo: tipoMov || novoStatus, data: new Date().toISOString(),
    usuarioId: u.id, motivo: motivo || ''
  });
  save();
  toast('Status atualizado', 'success');
  render();
}

function acceptReceipt(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (p.status !== 'aguardando_aceite' || p.responsavelAtualId !== u.id) {
    return toast('Apenas o destinatário pode aceitar', 'error');
  }
  p.status = 'ativo';
  p.atualizadoEm = new Date().toISOString();
  DB.movimentacoes.push({
    id: nextId('movimentacoes'), patrimonioId: p.id,
    tipo: 'aceite_recebimento', data: new Date().toISOString(),
    usuarioId: u.id, motivo: 'Recebimento confirmado pelo destinatário'
  });
  save();
  toast('Recebimento confirmado', 'success');
  render();
}

/* ============== APROVAÇÕES DE CADASTRO ============== */
function approveCadastro(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (!p || p.status !== 'aguardando_aprovacao_cadastro') return;
  if (!Perms.canApproveCadastro(u, p.categoriaId)) return toast('Sem permissão para aprovar', 'error');
  // Software (cat 3): aprovação vai direto para ativo (não há aceite físico de licença)
  const isSoft = p.categoriaId === 3;
  p.status = isSoft ? 'ativo' : 'aguardando_aceite';
  p.aprovadoPor = u.id; p.aprovadoEm = new Date().toISOString();
  DB.movimentacoes.push({
    id: nextId('movimentacoes'), patrimonioId: p.id,
    tipo: 'aprovacao_cadastro', data: new Date().toISOString(),
    usuarioId: u.id, motivo: isSoft ? 'Licença aprovada e ativada' : 'Cadastro aprovado'
  });
  save();
  toast(isSoft ? 'Licença aprovada e ativada' : 'Cadastro aprovado — aguardando aceite do responsável', 'success');
  render();
}
function rejectCadastro(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (!p || p.status !== 'aguardando_aprovacao_cadastro') return;
  if (!Perms.canApproveCadastro(u, p.categoriaId)) return toast('Sem permissão para rejeitar', 'error');
  DB.patrimonios = DB.patrimonios.filter(x => x.id !== p.id);
  DB.movimentacoes = DB.movimentacoes.filter(m => m.patrimonioId !== p.id);
  save(); toast('Cadastro rejeitado e removido', 'success'); render();
}

/* ============== APROVAÇÕES DE BAIXA / EXTRAVIO ============== */
function requestBaixa(patrimonioId, tipo) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (!p) return;
  if (!Perms.canRequestBaixa(u, p.categoriaId)) return toast('Sem permissão', 'error');
  const label = tipo === 'baixa' ? 'baixa' : 'extravio';
  if (Perms.isDiretoria(u)) {
    if (!confirm(`Confirmar ${label} deste patrimônio?`)) return;
    p.statusAnterior = p.status;
    p.status = tipo === 'baixa' ? 'baixado' : 'extraviado';
    p.atualizadoEm = new Date().toISOString();
    DB.movimentacoes.push({
      id: nextId('movimentacoes'), patrimonioId: p.id,
      tipo: tipo === 'baixa' ? 'baixa' : 'extravio',
      data: new Date().toISOString(), usuarioId: u.id,
      motivo: tipo === 'baixa' ? 'Baixa do patrimônio (Diretoria)' : 'Item extraviado (Diretoria)'
    });
    save(); toast(`${label.charAt(0).toUpperCase()+label.slice(1)} efetivada`, 'success'); render(); return;
  }
  const motivo = prompt(`Motivo da solicitação de ${label}:`, '');
  if (motivo === null) return;
  p.statusAnterior = p.status;
  p.status = tipo === 'baixa' ? 'aguardando_aprovacao_baixa' : 'aguardando_aprovacao_extravio';
  p.solicitadoPor = u.id; p.solicitadoEm = new Date().toISOString(); p.solicitacaoMotivo = motivo;
  DB.movimentacoes.push({
    id: nextId('movimentacoes'), patrimonioId: p.id,
    tipo: tipo === 'baixa' ? 'solicitacao_baixa' : 'solicitacao_extravio',
    data: new Date().toISOString(), usuarioId: u.id,
    motivo: motivo || `Solicitação de ${label}`
  });
  save(); toast(`Solicitação de ${label} enviada à Diretoria`, 'success'); render();
}
function approveBaixa(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (!p) return;
  if (!Perms.canApproveBaixa(u)) return toast('Apenas a Diretoria pode aprovar', 'error');
  const isBaixa = p.status === 'aguardando_aprovacao_baixa';
  const isExtr  = p.status === 'aguardando_aprovacao_extravio';
  if (!isBaixa && !isExtr) return;
  p.status = isBaixa ? 'baixado' : 'extraviado';
  p.aprovadoPor = u.id; p.aprovadoEm = new Date().toISOString();
  DB.movimentacoes.push({
    id: nextId('movimentacoes'), patrimonioId: p.id,
    tipo: isBaixa ? 'baixa' : 'extravio',
    data: new Date().toISOString(), usuarioId: u.id,
    motivo: isBaixa ? 'Baixa aprovada pela Diretoria' : 'Extravio aprovado pela Diretoria'
  });
  save(); toast(`${isBaixa ? 'Baixa' : 'Extravio'} aprovado`, 'success'); render();
}
function rejectBaixa(patrimonioId) {
  const p = DB.patrimonios.find(x => x.id === patrimonioId);
  const u = Lookup.user(DB.currentUser);
  if (!p) return;
  if (!Perms.canApproveBaixa(u)) return toast('Apenas a Diretoria pode rejeitar', 'error');
  const isBaixa = p.status === 'aguardando_aprovacao_baixa';
  const isExtr  = p.status === 'aguardando_aprovacao_extravio';
  if (!isBaixa && !isExtr) return;
  p.status = p.statusAnterior || 'ativo';
  delete p.statusAnterior; delete p.solicitadoPor; delete p.solicitadoEm; delete p.solicitacaoMotivo;
  DB.movimentacoes.push({
    id: nextId('movimentacoes'), patrimonioId: p.id,
    tipo: isBaixa ? 'rejeicao_baixa' : 'rejeicao_extravio',
    data: new Date().toISOString(), usuarioId: u.id,
    motivo: isBaixa ? 'Baixa rejeitada pela Diretoria' : 'Extravio rejeitado pela Diretoria'
  });
  save(); toast('Solicitação rejeitada', 'success'); render();
}

function deletePatrimonio(patrimonioId) {
  const u = Lookup.user(DB.currentUser);
  if (!Perms.canDelete(u)) return toast('Apenas a Diretoria pode excluir', 'error');
  DB.patrimonios = DB.patrimonios.filter(p => p.id !== patrimonioId);
  DB.movimentacoes = DB.movimentacoes.filter(m => m.patrimonioId !== patrimonioId);
  save();
  toast('Patrimônio excluído', 'success');
  render();
}

function bindCreate() {
  const u = Lookup.user(DB.currentUser);
  if (!Perms.canCreate(u)) return;

  const scanBtn = $('#c-scan');
  if (scanBtn) scanBtn.addEventListener('click', () => openScanner((code) => { $('#c-codigo').value = code; }));

  // Toggle campos software
  const catSel = $('#c-cat');
  function toggleSoftwareFields() {
    if (!catSel) return;
    const isSoft = parseInt(catSel.value) === 3;
    const fhw  = $('#form-hardware'),  fsw  = $('#form-software');
    const fhwx = $('#form-hw-extra');
    if (fhw)  fhw.style.display  = isSoft ? 'none'  : 'block';
    if (fhwx) fhwx.style.display = isSoft ? 'none'  : 'block';
    if (fsw)  fsw.style.display  = isSoft ? 'block' : 'none';
    if ($('#sw-chave'))  $('#sw-chave').required  = isSoft;
    if ($('#sw-resp'))   $('#sw-resp').required   = isSoft;
    if ($('#sw-subcat')) $('#sw-subcat').required = isSoft;
    if ($('#c-desc'))    $('#c-desc').required    = !isSoft;
    if ($('#c-loc'))     $('#c-loc').required     = !isSoft;
    if ($('#c-resp'))    $('#c-resp').required    = !isSoft;
    if ($('#c-subcat'))  $('#c-subcat').required  = !isSoft;
    // Código de barras: só usado para hardware (software é auto-gerado)
    const codGroup = $('#c-codigo-group');
    const codInput = $('#c-codigo');
    if (codGroup) codGroup.style.display = isSoft ? 'none' : 'block';
    if (codInput) codInput.required = !isSoft;
    // Popular subcategorias hardware
    const subcatSel = $('#c-subcat');
    if (subcatSel && !isSoft) {
      const catId = parseInt(catSel.value);
      const subs = (DB.subcategorias||[]).filter(s => s.categoriaId === catId);
      subcatSel.innerHTML = '<option value="">— Selecione —</option>' + subs.map(s => `<option value="${s.id}">${escapeHtml(s.nome)}</option>`).join('');
    }
    // Popular subcategorias software (com pré-seleção da primeira)
    const swSubcatSel = $('#sw-subcat');
    if (swSubcatSel && isSoft) {
      const subs = (DB.subcategorias||[]).filter(s => s.categoriaId === 3);
      swSubcatSel.innerHTML = subs.map((s,i) => `<option value="${s.id}"${i===0?' selected':''}>${escapeHtml(s.nome)}</option>`).join('');
    }
    // Pré-preencher Data do registro com hoje
    const swDataReg = $('#sw-data-registro');
    if (swDataReg && isSoft && !swDataReg.value) {
      swDataReg.value = new Date().toISOString().slice(0,10);
    }
  }
  if (catSel) { catSel.addEventListener('change', toggleSoftwareFields); toggleSoftwareFields(); }


  $('#create-form').addEventListener('submit', e => {
    e.preventDefault();
    const catId = parseInt($('#c-cat').value);
    const isOperador = Perms.isOperador(u);
    if (!isOperador && !Perms.canManageCategoria(u, catId)) return toast('Sem permissão para esta categoria', 'error');

    // ── Softwares TI (cat 3) ─────────────────────────────────
    if (catId === 3) {
      const chave = $('#sw-chave')  ? $('#sw-chave').value.trim()  : '';
      const resp  = $('#sw-resp')   ? $('#sw-resp').value.trim()   : '';
      const swSubcatId = $('#sw-subcat') ? (parseInt($('#sw-subcat').value)||null) : null;
      if (!swSubcatId) return toast('Selecione a subcategoria', 'error');
      if (!chave)      return toast('Informe o número da licença', 'error');
      if (!resp)       return toast('Informe o responsável', 'error');
      const subcatObj = (DB.subcategorias||[]).find(s => s.id === swSubcatId);
      const subcatNome = subcatObj ? subcatObj.nome : 'Licença';
      const descricao  = subcatNome + ' — ' + chave;
      const autoCode = 'BM-SW-' + String(DB._nextId.patrimonios).padStart(4,'0');
      const sw = {
        id: nextId('patrimonios'), codigoBarras: autoCode,
        categoriaId: 3, subcategoriaId: swSubcatId,
        descricao: descricao, tipoSoftware: subcatNome,
        licencaChave: chave,
        licencaValidade: $('#sw-validade') ? $('#sw-validade').value || null : null,
        licencaResponsavel: resp,
        valorAquisicao: parseFloat($('#sw-valor') ? $('#sw-valor').value : '0') || 0,
        dataAquisicao: $('#sw-data') ? $('#sw-data').value || null : null,
        dataRegistro:  $('#sw-data-registro') ? $('#sw-data-registro').value || null : null,
        observacoes: '',
        status: isOperador ? 'aguardando_aprovacao_cadastro' : 'ativo',
        criadoPor: u.id, criadoEm: new Date().toISOString(),
        localizacaoAtualId: null, responsavelAtualId: u.id
      };
      DB.patrimonios.push(sw);
      DB.movimentacoes.push({
        id: nextId('movimentacoes'), patrimonioId: sw.id,
        tipo: isOperador ? 'solicitacao_cadastro' : 'cadastro',
        data: new Date().toISOString(), usuarioId: u.id,
        motivo: isOperador ? 'Solicitação de cadastro de licença — aguardando aprovação' : 'Licença cadastrada'
      });
      save();
      toast(
        isOperador
          ? 'Solicitação enviada — aguardando aprovação do administrador'
          : 'Licença cadastrada!',
        'success'
      );
      State.tab='list'; render(); return;
    }

    // ── Hardware (cats 1 e 2) ─────────────────────────────────
    const codigo = $('#c-codigo').value.trim();
    if (!codigo) return toast('Informe o código de barras / número do patrimônio', 'error');
    if (DB.patrimonios.some(p => p.codigoBarras.toLowerCase() === codigo.toLowerCase())) {
      return toast('Já existe um patrimônio cadastrado com este código: ' + codigo, 'error');
    }
    const subcatId = $('#c-subcat') ? (parseInt($('#c-subcat').value)||null) : null;
    if (!subcatId) return toast('Selecione a subcategoria', 'error');

    const novo = {
      id: nextId('patrimonios'),
      codigoBarras: codigo,
      descricao: $('#c-desc').value.trim(),
      categoriaId: catId,
      subcategoriaId: subcatId,
      notaFiscal: $('#c-nf').value.trim(),
      dataAquisicao: $('#c-data').value || null,
      valorAquisicao: parseFloat($('#c-valor').value) || 0,
      localizacaoAtualId: parseInt($('#c-loc').value),
      responsavelAtualId: parseInt($('#c-resp').value),
      observacoes: $('#c-obs').value.trim(),
      status: isOperador ? 'aguardando_aprovacao_cadastro' : 'aguardando_aceite',
      criadoPor: u.id,
      criadoEm: new Date().toISOString()
    };
    DB.patrimonios.push(novo);
    DB.movimentacoes.push({
      id: nextId('movimentacoes'), patrimonioId: novo.id,
      tipo: isOperador ? 'solicitacao_cadastro' : 'cadastro',
      data: new Date().toISOString(),
      usuarioId: u.id,
      motivo: isOperador ? 'Solicitação de cadastro — aguardando aprovação' : 'Cadastro inicial',
      destinoLocalId: novo.localizacaoAtualId, destinoRespId: novo.responsavelAtualId
    });
    save();
    toast(
      isOperador
        ? 'Solicitação enviada — aguardando aprovação do administrador'
        : 'Cadastrado — aguardando aceite do responsável',
      'success'
    );
    State.tab = 'list';
    render();
  });
}

/* ============== SCANNER ============== */

let codeReader = null;
function openScanner(onCode, keepOpen=false) {
  const html = `
    <div class="modal-backdrop" id="modal-scan">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="close-btn" data-close>&times;</button>
        <h2>Escanear código</h2>
        <div class="scanner-container">
          <video id="scanner-video" playsinline></video>
          <div class="scanner-overlay"></div>
          <div class="scanner-status" id="scanner-status">Aponte para o código de barras</div>
        </div>
        <div class="form-group" style="margin-top:14px;">
          <label>Ou digite o código manualmente</label>
          <input type="text" id="manual-code" placeholder="Ex.: BM-TI-0001">
        </div>
        <button class="btn" id="manual-go">Confirmar código</button>
      </div>
    </div>
  `;
  const wrap = document.createElement('div'); wrap.innerHTML = html;
  const node = wrap.firstElementChild; document.body.appendChild(node);
  const close = () => {
    if (codeReader) { try { codeReader.reset(); } catch {} codeReader = null; }
    node.remove();
  };
  node.addEventListener('click', e => { if (e.target === node) close(); });
  node.querySelector('[data-close]').addEventListener('click', close);

  const handleCode = (code) => {
    if (!onCode) {
      // default: try to find and open
      const p = DB.patrimonios.find(p => p.codigoBarras === code);
      if (p) { close(); openDetail(p.id); }
      else { node.querySelector('#scanner-status').textContent = 'Código não cadastrado: ' + code; }
      return;
    }
    if (keepOpen) {
      onCode(code);
      close();
    } else {
      onCode(code);
      close();
    }
  };

  node.querySelector('#manual-go').addEventListener('click', () => {
    const c = node.querySelector('#manual-code').value.trim();
    if (!c) return;
    handleCode(c);
  });

  // Try to start camera
  try {
    if (typeof ZXing === 'undefined') throw new Error('ZXing não carregou');
    codeReader = new ZXing.BrowserMultiFormatReader();
    codeReader.decodeFromVideoDevice(null, 'scanner-video', (result, err) => {
      if (result) {
        node.querySelector('#scanner-status').textContent = '✓ Lido: ' + result.text;
        handleCode(result.text);
      }
    }).catch(e => {
      node.querySelector('#scanner-status').textContent = 'Sem acesso à câmera. Use o campo abaixo.';
    });
  } catch (e) {
    node.querySelector('#scanner-status').textContent = 'Câmera indisponível. Digite manualmente.';
  }
}

function openReport(kind) {
  const me = Lookup.user(DB.currentUser);
  const base = Lookup.visibleItems(me);
  let titulo, rows;
  if (kind === 'cat') {
    titulo = 'Por categoria';
    rows = DB.categorias.map(c => {
      const items = base.filter(p => p.categoriaId === c.id);
      return { nome: c.icone+' '+c.nome, qtd: items.length, valor: items.reduce((s,p) => s+(p.valorAquisicao||0), 0) };
    }).filter(r => r.qtd > 0);
  } else if (kind === 'loc') {
    titulo = 'Por localização';
    rows = DB.localizacoes.map(l => {
      const items = base.filter(p => p.localizacaoAtualId === l.id);
      return { nome: l.nome, qtd: items.length, valor: items.reduce((s,p) => s+(p.valorAquisicao||0), 0) };
    }).filter(r => r.qtd > 0);
  } else {
    titulo = 'Por responsável';
    rows = DB.usuarios.map(u => {
      const items = base.filter(p => p.responsavelAtualId === u.id);
      return { nome: u.nome+' ('+(u.setor||'—')+')', qtd: items.length, valor: items.reduce((s,p) => s+(p.valorAquisicao||0), 0) };
    }).filter(r => r.qtd > 0);
  }
  const html = `
    <div class="modal-backdrop" id="modal-rep">
      <div class="modal" onclick="event.stopPropagation()">
        <button class="close-btn" data-close>&times;</button>
        <h2>Relatório · ${titulo}</h2>
        <div class="card" style="padding:0;">
          ${rows.map(r => `
            <div class="detail-row" style="padding:12px;">
              <span class="label" style="color:var(--text); font-weight:600;">${escapeHtml(r.nome)}</span>
              <span class="value">${r.qtd} itens · ${fmtMoney(r.valor)}</span>
            </div>
          `).join('') || '<div class="empty-state"><p>Sem dados.</p></div>'}
        </div>
      </div>
    </div>
  `;
  const wrap = document.createElement('div'); wrap.innerHTML = html;
  const node = wrap.firstElementChild; document.body.appendChild(node);
  node.addEventListener('click', e => { if (e.target === node) node.remove(); });
  node.querySelector('[data-close]').addEventListener('click', () => node.remove());
}

function exportCSV() {
  const me = Lookup.user(DB.currentUser);
  const sep = ';';
  const headers = ['Codigo','Descricao','Categoria','NF','Aquisicao','Valor','Status','Localizacao','Responsavel'];
  const rows = Lookup.visibleItems(me).map(p => [
    p.codigoBarras,
    (p.descricao||'').replace(/[\r\n;]/g,' '),
    (Lookup.cat(p.categoriaId)||{}).nome || '',
    p.notaFiscal||'',
    p.dataAquisicao||'', (p.valorAquisicao||0).toFixed(2).replace('.',','),
    statusLabel(p.status),
    (Lookup.loc(p.localizacaoAtualId)||{}).nome || '',
    (Lookup.user(p.responsavelAtualId)||{}).nome || ''
  ]);
  const csv = '﻿' + [headers, ...rows].map(r => r.join(sep)).join('\n');
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'patrimonio_brandao_marmo.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('CSV exportado', 'success');
}
