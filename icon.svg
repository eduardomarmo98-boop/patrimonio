<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="rounded">
      <rect x="0" y="0" width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="512" height="512" fill="#1B2A5E"/>
    <!-- Top-left light blue swoosh -->
    <path d="M -80 80 Q 200 -40 600 200 L 600 60 Q 200 -120 -80 -20 Z" fill="rgba(255,255,255,0.18)"/>
    <!-- Bottom-right orange swoosh -->
    <path d="M -40 360 Q 240 280 600 380 L 600 460 Q 240 360 -40 440 Z" fill="#EE7E22"/>
    <!-- Clipboard icon -->
    <g transform="translate(176, 96)">
      <!-- Clip top -->
      <rect x="48" y="0" width="64" height="28" rx="6" fill="#FFFFFF"/>
      <!-- Clipboard body -->
      <rect x="0" y="20" width="160" height="216" rx="14" fill="none" stroke="#FFFFFF" stroke-width="14"/>
      <!-- Bar chart -->
      <rect x="36"  y="138" width="20" height="40" fill="#FFFFFF"/>
      <rect x="70"  y="108" width="20" height="70" fill="#FFFFFF"/>
      <rect x="104" y="80"  width="20" height="98" fill="#FFFFFF"/>
      <!-- Text lines below chart -->
      <rect x="36" y="190" width="88"  height="8" rx="3" fill="#FFFFFF"/>
      <rect x="36" y="206" width="68"  height="8" rx="3" fill="#FFFFFF"/>
    </g>
    <!-- PATRIMÔNIO text -->
    <text x="256" y="400" text-anchor="middle"
          font-family="Helvetica, Arial, sans-serif"
          font-weight="900" font-size="62" letter-spacing="-1"
          fill="#FFFFFF">PATRIMÔNIO</text>
    <!-- Subtitle -->
    <text x="256" y="450" text-anchor="middle"
          font-family="Helvetica, Arial, sans-serif"
          font-weight="600" font-size="22" letter-spacing="6"
          fill="#FFFFFF">CONTROLE DE ATIVOS</text>
  </g>
</svg>
